name: 'ecommerce_platform'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_platform'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_platform:
    staging:
      +materialized: view          # staging = views, không tốn storage
      +dataset: staging
    marts:
      +materialized: incremental   # marts = incremental tables
      +dataset: marts